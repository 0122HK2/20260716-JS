<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>利用規約の同意および会員登録</title>
    <!-- CSSファイルを読み込み -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- jQueryの読み込み -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- 外部JSファイルを読み込み -->
    <script src="js/script.js"></script>
</head>
<body>

    <div class="terms-card">
        <!-- ヘッダーエリア -->
        <header class="terms-header">
            <span class="badge"></span>
            <h1 class="terms-title">利用規約への同意</h1>
            <p class="terms-subtitle">サービスを安全にご利用いただくため、内容をご確認ください。</p>
        </header>

        <!-- 規約の長文スクロールエリア -->
        <div class="terms-body">
            <section class="terms-section">
                <h2>第1条（総則および本規約の適用）</h2>
                <p>本利用規約（以下「本規約」といいます）は、当サービス提供のすべてのプラットフォームの利用条件を定めるものです。</p>
            </section>

            <!-- 💡 画像のファイル名を organization に修正 -->
            <div class="terms-figure">
                <a href="img/organization.png" class="modal-trigger">
                    <img src="img/organization-mini.png" alt="サービス概念プロセス図" class="figure-image">
                </a>
                <span class="figure-caption">※画像をクリックすると拡大表示します</span>
            </div>

            <section class="terms-section">
                <h2>第2条（アカウント登録と管理責任）</h2>
                <p>登録希望者は、自身に関する真実かつ正確な情報を入力するものとします。</p>
            </section>
        </div>

        <!-- 同意＆登録アクションエリア -->
        <footer class="terms-footer">
            <div class="agreement-wrapper">
                <label class="custom-checkbox">
                    <input type="checkbox" id="agree-checkbox">
                    <span class="checkbox-indicator"></span>
                    <span class="checkbox-text">利用規約の内容を理解し、これに同意します</span>
                </label>
            </div>
            
            <!-- 💡 同意ボタン。クリック時に表示させたい画像を data-target 属性で指定するようにしました -->
            <button class="submit-button" id="submit-btn" data-target="img/a.png" disabled>
                同意してアカウントを作成する
            </button>
        </footer>
    </div>

</body>
</html>
